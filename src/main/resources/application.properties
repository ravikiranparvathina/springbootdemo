# Spring Security - default credentials for demo
# In production, use environment variables or a secrets manager
spring.security.user.name=${SPRING_SECURITY_USER:admin}
spring.security.user.password=${SPRING_SECURITY_PASSWORD:changeme}

# Disable exposing server details
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.server-header=
